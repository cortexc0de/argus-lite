{% extends "base.html" %}
{% block title %}Argus — Settings{% endblock %}
{% block content %}
<div class="page-header">
  <h2 class="page-title">Settings</h2>
</div>

{% if saved %}<div class="alert alert-success fade-in">Configuration saved successfully.</div>{% endif %}

<form method="POST" action="/settings">
<div class="grid-2">
  <div>
    <div class="panel">
      <div class="panel-title">OSINT API Keys</div>
      {% for key, label in keys %}
      <div class="input-group">
        <label>{{ label }}</label>
        <input type="password" name="{{ key }}" class="input-field" value="{{ config.get(key, '') }}" placeholder="Enter key...">
      </div>
      {% endfor %}
    </div>

    <div class="panel">
      <div class="panel-title">Rate Limits</div>
      <div class="grid-3">
        <div class="input-group">
          <label>Global RPS</label>
          <input type="number" name="rate_global" class="input-field" value="{{ config.get('rate_global', 50) }}">
        </div>
        <div class="input-group">
          <label>Per-target RPS</label>
          <input type="number" name="rate_per_target" class="input-field" value="{{ config.get('rate_per_target', 10) }}">
        </div>
        <div class="input-group">
          <label>Concurrent</label>
          <input type="number" name="rate_concurrent" class="input-field" value="{{ config.get('rate_concurrent', 5) }}">
        </div>
      </div>
    </div>
  </div>

  <div>
    <div class="panel">
      <div class="panel-title">AI Provider</div>
      <div class="input-group">
        <label>Base URL</label>
        <input type="text" name="ai_base_url" class="input-field" value="{{ config.get('ai_base_url', 'https://api.openai.com/v1') }}">
      </div>
      <div class="input-group">
        <label>API Key</label>
        <input type="password" name="ai_api_key" class="input-field" value="{{ config.get('ai_api_key', '') }}">
      </div>
      <div class="input-group">
        <label>Model</label>
        <input type="text" name="ai_model" class="input-field" value="{{ config.get('ai_model', 'gpt-4o') }}">
      </div>
      <div class="input-group">
        <label>Language</label>
        <select name="ai_lang" class="input-field">
          <option value="en" {% if config.get('ai_lang','en')=='en' %}selected{% endif %}>English</option>
          <option value="ru" {% if config.get('ai_lang')=='ru' %}selected{% endif %}>Russian</option>
        </select>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Notifications</div>
      <div class="input-group">
        <label>Telegram Token</label>
        <input type="password" name="tg_token" class="input-field" value="{{ config.get('tg_token', '') }}">
      </div>
      <div class="input-group">
        <label>Telegram Chat ID</label>
        <input type="text" name="tg_chat_id" class="input-field" value="{{ config.get('tg_chat_id', '') }}">
      </div>
      <div class="input-group">
        <label>Discord Webhook</label>
        <input type="password" name="discord_webhook" class="input-field" value="{{ config.get('discord_webhook', '') }}">
      </div>
    </div>
  </div>
</div>

<button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:14px;margin-top:8px;font-size:15px;">
  Save Configuration
</button>
</form>
{% endblock %}
