<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Argus{% endblock %}</title>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0a0e17;
  --surface: #111827;
  --card: #1a2332;
  --border: #2d3748;
  --text: #e2e8f0;
  --dim: #718096;
  --accent: #00ff41;
  --accent-dim: #00cc33;
  --blue: #3b82f6;
  --cyan: #06b6d4;
  --yellow: #f59e0b;
  --red: #ef4444;
  --orange: #f97316;
  --green: #22c55e;
  --purple: #8b5cf6;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }

/* Sidebar */
.sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 220px; background: var(--surface); border-right: 1px solid var(--border); padding: 20px 0; z-index: 100; display: flex; flex-direction: column; }
.sidebar-logo { padding: 0 20px 20px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
.sidebar-logo h1 { font-size: 22px; color: var(--accent); font-weight: 800; letter-spacing: 2px; }
.sidebar-logo span { font-size: 11px; color: var(--dim); display: block; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; color: var(--dim); text-decoration: none; font-size: 14px; transition: all 0.15s; border-left: 3px solid transparent; }
.nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(0,255,65,0.05); }
.nav-icon { font-size: 18px; width: 24px; text-align: center; }
.nav-bottom { margin-top: auto; padding: 12px 20px; border-top: 1px solid var(--border); }
.nav-bottom a { color: var(--dim); font-size: 12px; text-decoration: none; }

/* Main */
.main { margin-left: 220px; padding: 24px 32px; min-height: 100vh; }
.page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.page-title { font-size: 24px; font-weight: 700; }
.page-actions { display: flex; gap: 10px; }

/* Cards */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; position: relative; overflow: hidden; }
.stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.stat-card.green::before { background: var(--green); }
.stat-card.blue::before { background: var(--blue); }
.stat-card.yellow::before { background: var(--yellow); }
.stat-card.red::before { background: var(--red); }
.stat-card.purple::before { background: var(--purple); }
.stat-card.cyan::before { background: var(--cyan); }
.stat-value { font-size: 32px; font-weight: 800; margin-bottom: 4px; }
.stat-label { font-size: 12px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; }

/* Table */
.data-table { width: 100%; border-collapse: separate; border-spacing: 0; background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.data-table th { padding: 12px 16px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--dim); background: var(--surface); font-weight: 600; border-bottom: 1px solid var(--border); }
.data-table td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 14px; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: rgba(255,255,255,0.02); }
.data-table tr { cursor: pointer; transition: background 0.1s; }

/* Badges */
.badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.badge-none, .badge-completed { background: rgba(34,197,94,0.15); color: var(--green); }
.badge-low { background: rgba(59,130,246,0.15); color: var(--blue); }
.badge-medium { background: rgba(245,158,11,0.15); color: var(--yellow); }
.badge-high { background: rgba(239,68,68,0.15); color: var(--red); }
.badge-info { background: rgba(6,182,212,0.15); color: var(--cyan); }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; text-decoration: none; border: none; cursor: pointer; transition: all 0.15s; }
.btn-primary { background: var(--accent); color: #000; }
.btn-primary:hover { background: #33ff5e; transform: translateY(-1px); }
.btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--accent); }
.btn-danger { background: rgba(239,68,68,0.15); color: var(--red); }

/* Input */
.input-group { margin-bottom: 16px; }
.input-group label { display: block; font-size: 12px; color: var(--dim); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.input-field { width: 100%; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; transition: border 0.15s; }
.input-field:focus { border-color: var(--accent); }
select.input-field { appearance: none; }

/* Panels */
.panel { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
.panel-title { font-size: 14px; font-weight: 700; color: var(--accent); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }

/* Charts */
.chart-container { position: relative; height: 200px; margin-bottom: 16px; }

/* Code */
code { background: var(--bg); padding: 2px 6px; border-radius: 4px; font-size: 12px; font-family: 'JetBrains Mono', 'Fira Code', monospace; }
pre { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; overflow-x: auto; font-size: 12px; line-height: 1.5; }

/* Grid layouts */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

/* Alerts */
.alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; }
.alert-success { background: rgba(0,255,65,0.08); border: 1px solid rgba(0,255,65,0.2); color: var(--accent); }
.alert-warning { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2); color: var(--yellow); }
.alert-error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); color: var(--red); }

/* Loading */
.htmx-indicator { display: none; }
.htmx-request .htmx-indicator { display: inline-block; }
.spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Responsive */
@media (max-width: 900px) {
  .sidebar { width: 60px; }
  .sidebar-logo h1, .nav-label, .sidebar-logo span, .nav-bottom { display: none; }
  .main { margin-left: 60px; padding: 16px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
}

/* HTMX transitions */
.fade-in { animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo">
    <h1>ARGUS</h1>
    <span>Security Scanner v2.0</span>
  </div>
  <a href="/" class="nav-item {% if page == 'dashboard' %}active{% endif %}">
    <span class="nav-icon">📊</span><span class="nav-label">Dashboard</span>
  </a>
  <a href="/scan" class="nav-item {% if page == 'scan' %}active{% endif %}">
    <span class="nav-icon">🔍</span><span class="nav-label">New Scan</span>
  </a>
  <a href="/results" class="nav-item {% if page == 'results' %}active{% endif %}">
    <span class="nav-icon">📋</span><span class="nav-label">Results</span>
  </a>
  <a href="/osint" class="nav-item {% if page == 'osint' %}active{% endif %}">
    <span class="nav-icon">🌐</span><span class="nav-label">OSINT</span>
  </a>
  <a href="/settings" class="nav-item {% if page == 'settings' %}active{% endif %}">
    <span class="nav-icon">⚙️</span><span class="nav-label">Settings</span>
  </a>
  <div class="nav-bottom">
    <a href="/api/stats">API Docs</a>
  </div>
</nav>

<main class="main">
  {% block content %}{% endblock %}
</main>

</body>
</html>
