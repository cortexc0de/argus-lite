name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: input
    id: version
    attributes:
      label: Argus Version
      description: "Run `argus --version` or check pyproject.toml"
      placeholder: "6.0.0"
    validations:
      required: true

  - type: dropdown
    id: command
    attributes:
      label: Command
      description: Which command were you running?
      options:
        - argus scan
        - argus agent
        - argus bulk
        - argus discover
        - argus monitor
        - argus dashboard
        - argus tui
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly
      placeholder: "When I ran argus scan example.com, it crashed with..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue
      value: |
        1.
        2.
        3.

  - type: textarea
    id: logs
    attributes:
      label: Error output / logs
      description: Paste the full error output
      render: shell

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "Kali Linux 2024.4 / Ubuntu 22.04 / Docker"

  - type: input
    id: python
    attributes:
      label: Python Version
      placeholder: "3.12.1"
