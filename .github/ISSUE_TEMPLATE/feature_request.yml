name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've considered?

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of Argus does this relate to?
      options:
        - Agent (AI/LLM)
        - Scan Pipeline
        - Skills
        - OSINT APIs
        - Dashboard
        - CLI
        - TUI
        - Docker
        - GitHub Actions
        - Documentation
        - Other
